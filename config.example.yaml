# Track 2 — Stage 1 config (copy to config.yaml; config.yaml is gitignored).

# Forward horizon (in bars) over which the directional call is graded.
horizon: 8

# Threshold below which a forward move counts as "no move" when grading a call.
# 0.0 = any move in the called direction counts.
flat_threshold: 0.0

# Indicator periods (passed to engine.compute_indicators). Same code every
# instrument; only data source differs. This is the trader's real chart stack:
# EMA 5/45/100/200 + SMA 20 + Bollinger + RSI + MACD + Supertrend + CPR pivots.
indicators:
  ema_periods: [5, 45, 100, 200]
  sma_period: 20
  bb_period: 20
  bb_std: 2.0
  rsi_period: 14
  macd:
    fast: 12
    slow: 26
    signal: 9
  supertrend:
    period: 7                   # matches the trader's chart: Supertrend (7,3)
    multiplier: 3.0
  # CPR pivots take no params (derived from the prior bar's H/L/C).

# Data sourcing. History windows in calendar days; daily must cover SMA-200's
# ~400-day warm-up. `intervals` (optional) overrides the per-source (base, daily)
# interval strings; defaults: twelvedata=[3min,1day], breeze=[3minute,1day].
data:
  intraday_days: 40             # ~5000 3-min bars — Twelve Data free-tier friendly
  daily_days: 800
  # intervals:
  #   twelvedata: [3min, 1day]
  #   breeze: [3minute, 1day]

# Stage-1 sweep grid. Each instrument is scored over mtf_method x tf_method, so
# the table shows which resolver wins per instrument (the point of Track 2).
sweep:
  enabled: true
  mtf_methods: [htf_bias_trigger, cross_tf_confluence, per_tf_then_vote]
  tf_methods: [confluence, hierarchical]

# Multi-timeframe stack. Pull a 3m base + daily direct, resample the rest
# locally (see indicators/timeframes.py). All TFs are aligned no-lookahead.
timeframes:
  base: 3min                    # trigger TF, pulled
  resample_intraday:            # tf_name: pandas rule (resampled from base)
    15min: 15min
    60min: 60min
  pull_direct: [1day]           # pulled straight from the API
  resample_from_daily:          # tf_name: pandas rule (resampled from daily)
    1week: 1W

# THE directional-output switch (see indicators/DIRECTIONAL_SPEC.md).
# `directional` is the PER-TIMEFRAME resolver; `mtf` combines timeframes.
# Stage 1 sweeps these per instrument — these are just the defaults.
directional:
  method: confluence            # confluence | hierarchical
  # Voters (keys of indicators.directional.VOTERS): ema, ema_stack, supertrend,
  # cpr, macd, rsi, bollinger, three_min. NOTE: cpr is a daily/weekly bias voter
  # (on the 3m trigger it degenerates to a per-bar pivot).
  voters: [ema_stack, supertrend, macd, rsi, bollinger, cpr]
  voter_kwargs:
    rsi: {mode: momentum}       # momentum | reversion
    bollinger: {mode: reversion}  # reversion | breakout
  # --- confluence params ---
  min_agree: 3
  # --- hierarchical params (used when method: hierarchical) ---
  primary: ema_stack            # must be one of `voters`
  confirm_min: 0                # >0 => hierarchical-with-confluence-confirmation
  veto: true

# How the timeframes combine into one 3m call (see DIRECTIONAL_SPEC.md "MTF").
mtf:
  mtf_method: htf_bias_trigger  # htf_bias_trigger | cross_tf_confluence | per_tf_then_vote
  trigger_tf: 3min
  bias_tfs: [15min, 60min, 1day, 1week]
  bias_quorum: 2                # net HTF agreement needed to set a bias
  veto: true                    # a conflicting HTF cancels the bias -> stand down

# Instruments to score. `source` selects the loader; `symbol` is the
# provider-specific ticker. `session_anchor` aligns intraday resample bins to
# the market open (offset from local midnight); `tz` documents the exchange tz.
#
# Breeze (Indian) creds come from the environment:
#   BREEZE_API_KEY, BREEZE_API_SECRET, BREEZE_SESSION_TOKEN
# Defaults are exchange_code=NSE, product_type=cash; the BreezeLoader accepts
# overrides if a future instrument needs a different segment.
# Twelve Data (global) uses TWELVEDATA_API_KEY.
instruments:
  - name: NIFTY
    source: breeze              # breeze | twelvedata
    symbol: NIFTY
    tz: Asia/Kolkata
    session_anchor: 9h15min
  - name: BANKNIFTY
    source: breeze
    symbol: CNXBAN
    tz: Asia/Kolkata
    session_anchor: 9h15min
  - name: NIKKEI
    source: twelvedata
    symbol: "N225"
    tz: Asia/Tokyo
    session_anchor: 9h00min
  - name: USDINR
    source: twelvedata
    symbol: "USD/INR"
    tz: Asia/Kolkata
    session_anchor: null        # 24x5 FX — no session anchor

# --- Live agent (Phase 1 slice: feeds -> analysis -> propose -> approve) ------
# The dashboard (dashboard/app.py) and the analysis/execution layers. Execution
# is PROPOSE-ONLY: nothing fires without your tap, and an approved order is still
# DRY-RUN unless `live` is on AND EXECUTION_LIVE=1 is set in the environment.
execution:
  lot_size: 75                  # NIFTY contract multiplier
  normal_size_lots: [65, 130]   # the journal's discipline band
  default_size_lots: 75
  live: false                   # dashboard toggle default; live also needs EXECUTION_LIVE=1
  # Breeze order key must be Trade+View with WITHDRAW DISABLED (SEBI non-algo).

# Claude reasoning + sparring layer (agent/). Reads the snapshot + proposal and
# challenges the trade like the journal does, then feeds the decision log back as
# memory (the learning loop). Needs an Anthropic API key in the environment:
#   ANTHROPIC_API_KEY=...   (separate from a Claude.ai chat subscription)
agent:
  enabled: true                 # dashboard "Claude sparring" toggle default
  model: claude-opus-4-8
