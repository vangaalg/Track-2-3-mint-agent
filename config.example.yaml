# Track 2 — Stage 1 config (copy to config.yaml; config.yaml is gitignored).

# Forward horizon (in bars) over which the directional call is graded.
horizon: 8

# Threshold below which a forward move counts as "no move" when grading a call.
# 0.0 = any move in the called direction counts.
flat_threshold: 0.0

# Indicator periods (passed to engine.compute_indicators). Same code every
# instrument; only data source differs.
indicators:
  ema_fast: 9
  ema_slow: 21
  sma_ref: 50
  sma_trend: 200
  bb_period: 20
  bb_std: 2.0
  rsi_period: 14
  macd:
    fast: 12
    slow: 26
    signal: 9

# Data sourcing. History windows in calendar days; daily must cover SMA-200's
# ~400-day warm-up. `intervals` (optional) overrides the per-source (base, daily)
# interval strings; defaults: twelvedata=[3min,1day], breeze=[3minute,1day].
data:
  intraday_days: 40             # ~5000 3-min bars — Twelve Data free-tier friendly
  daily_days: 800
  # intervals:
  #   twelvedata: [3min, 1day]
  #   breeze: [3minute, 1day]

# Stage-1 sweep grid. Each instrument is scored over mtf_method x tf_method, so
# the table shows which resolver wins per instrument (the point of Track 2).
sweep:
  enabled: true
  mtf_methods: [htf_bias_trigger, cross_tf_confluence, per_tf_then_vote]
  tf_methods: [confluence, hierarchical]

# Multi-timeframe stack. Pull a 3m base + daily direct, resample the rest
# locally (see indicators/timeframes.py). All TFs are aligned no-lookahead.
timeframes:
  base: 3min                    # trigger TF, pulled
  resample_intraday:            # tf_name: pandas rule (resampled from base)
    15min: 15min
    60min: 60min
  pull_direct: [1day]           # pulled straight from the API
  resample_from_daily:          # tf_name: pandas rule (resampled from daily)
    1week: 1W

# THE directional-output switch (see indicators/DIRECTIONAL_SPEC.md).
# `directional` is the PER-TIMEFRAME resolver; `mtf` combines timeframes.
# Stage 1 sweeps these per instrument — these are just the defaults.
directional:
  method: confluence            # confluence | hierarchical
  voters: [ema, macd, rsi, bollinger, three_min]
  voter_kwargs:
    rsi: {mode: momentum}       # momentum | reversion
    bollinger: {mode: reversion}  # reversion | breakout
  # --- confluence params ---
  min_agree: 3
  # --- hierarchical params (used when method: hierarchical) ---
  primary: ema
  confirm_min: 0                # >0 => hierarchical-with-confluence-confirmation
  veto: true

# How the timeframes combine into one 3m call (see DIRECTIONAL_SPEC.md "MTF").
mtf:
  mtf_method: htf_bias_trigger  # htf_bias_trigger | cross_tf_confluence | per_tf_then_vote
  trigger_tf: 3min
  bias_tfs: [15min, 60min, 1day, 1week]
  bias_quorum: 2                # net HTF agreement needed to set a bias
  veto: true                    # a conflicting HTF cancels the bias -> stand down

# Instruments to score. `source` selects the loader; `symbol` is the
# provider-specific ticker. `session_anchor` aligns intraday resample bins to
# the market open (offset from local midnight); `tz` documents the exchange tz.
instruments:
  - name: NIFTY
    source: breeze              # breeze | twelvedata
    symbol: NIFTY
    tz: Asia/Kolkata
    session_anchor: 9h15min
  - name: BANKNIFTY
    source: breeze
    symbol: CNXBAN
    tz: Asia/Kolkata
    session_anchor: 9h15min
  - name: NIKKEI
    source: twelvedata
    symbol: "N225"
    tz: Asia/Tokyo
    session_anchor: 9h00min
  - name: USDINR
    source: twelvedata
    symbol: "USD/INR"
    tz: Asia/Kolkata
    session_anchor: null        # 24x5 FX — no session anchor
