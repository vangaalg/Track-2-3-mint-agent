# Track 2 — Stage 1 config (copy to config.yaml; config.yaml is gitignored).

# Forward horizon (in bars) over which the directional call is graded.
horizon: 8

# Threshold below which a forward move counts as "no move" when grading a call.
# 0.0 = any move in the called direction counts.
flat_threshold: 0.0

# Indicator periods (passed to engine.compute_indicators). Same code every
# instrument; only data source differs.
indicators:
  ema_fast: 9
  ema_slow: 21
  sma_ref: 50
  sma_trend: 200
  bb_period: 20
  bb_std: 2.0
  rsi_period: 14
  macd:
    fast: 12
    slow: 26
    signal: 9

# THE directional-output switch (see indicators/DIRECTIONAL_SPEC.md).
# Stage 1 sweeps both methods per instrument — this is just the default.
directional:
  method: confluence            # confluence | hierarchical
  voters: [ema, macd, rsi, bollinger, three_min]
  voter_kwargs:
    rsi: {mode: momentum}       # momentum | reversion
    bollinger: {mode: reversion}  # reversion | breakout
  # --- confluence params ---
  min_agree: 3
  # --- hierarchical params (used when method: hierarchical) ---
  primary: ema
  confirm_min: 0                # >0 => hierarchical-with-confluence-confirmation
  veto: true

# Instruments to score. `source` selects the loader; `symbol` is the
# provider-specific ticker. (Loader wiring is the next TODO.)
instruments:
  - name: NIFTY
    source: breeze              # breeze | twelvedata
    symbol: NIFTY
    interval: 3minute
  - name: BANKNIFTY
    source: breeze
    symbol: CNXBAN
    interval: 3minute
  - name: NIKKEI
    source: twelvedata
    symbol: "N225"
    interval: 3min
  - name: USDINR
    source: twelvedata
    symbol: "USD/INR"
    interval: 3min
